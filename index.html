<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Sezioni a Schermata</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    scroll-behavior: smooth;
    scroll-snap-type: y proximity; /* scroll morbido */
    overflow-y: scroll;
  }

  section {
    height: 100vh; /* una schermata */
    scroll-snap-align: start;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    color: #ffffff;
  }

  .s1 { background: #6ba96b; } /* verde 1 */
  .s2 { background: #4f8f4f; } /* verde 2 */
  .s3 { background: #3b6f3b; } /* verde 3 */
</style>
</head>
<body>

<section class="s1">Sezione 1</section>
<section class="s2">Sezione 2</section>
<section class="s3">Sezione 3</section>

</body>
</html>
